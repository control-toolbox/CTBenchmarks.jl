name: Benchmark Reusable

on:
  workflow_call:
    inputs:
      script_path:
        description: "Julia script to run benchmark"
        required: true
        type: string
      julia_version:
        description: "Julia version to install"
        required: true
        type: string
      julia_arch:
        description: "Julia architecture (e.g., x64, aarch64)"
        required: true
        type: string
      runs_on:
        description: "GitHub runner labels (e.g., ubuntu-latest or JSON array for self-hosted)"
        required: true
        type: string
      runner:
        description: "Runner type: 'github' for standard runners or 'self-hosted' for self-hosted runners"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  run:
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    timeout-minutes: 600 # max is 360 on GitHub runners
    env:
      SCRIPT_PATH: ${{ inputs.script_path }}

    steps:
      # ---------------------------
      # Checkout Repository
      # ---------------------------
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📋 Repository checkout status
        run: |
          echo "✅ Repository checked out successfully"
          echo "📁 Current directory: $(pwd)"
          echo "📊 Total files: $(find . -type f | wc -l)"

      - name: 📄 Prepare benchmark output filename
        run: |
          OUTPUT_FILE="benchmark_output_path_$(date +%s)_$RANDOM.txt"
          echo "BENCHMARK_OUTPUT_FILE=$OUTPUT_FILE" >> $GITHUB_ENV
          echo "📄 Benchmark output file will be stored in: $OUTPUT_FILE"

      # ---------------------------
      # Setup Julia Environment
      # ---------------------------
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ inputs.julia_version }}
          arch: ${{ inputs.julia_arch }}

      - name: 🔋 Julia setup status
        run: |
          echo "✅ Julia $(julia --version | cut -d' ' -f3) installed successfully"
          echo "📍 Julia location: $(which julia)"

      # ---------------------------
      # Julia caching
      # ---------------------------
      - name: Cache Julia packages (standard runners)
        if: inputs.runner != 'self-hosted'
        uses: julia-actions/cache@v2

      - name: Cache Julia artifacts (self-hosted runners)
        if: inputs.runner == 'self-hosted'
        uses: actions/cache@v5
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-benchmark-${{ env.cache-name }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-benchmark-${{ env.cache-name }}-
            ${{ runner.os }}-benchmark-
            ${{ runner.os }}-

      - name: 💾 Julia cache status
        run: |
          if [ "${{ inputs.runner }}" = "self-hosted" ]; then
            echo "✅ Julia artifacts cache configured (self-hosted strategy)"
          else
            echo "✅ Julia package cache configured (standard strategy)"
          fi

      - uses: julia-actions/julia-buildpkg@v1
        with:
          ignore-no-cache: true

      - name: 🔨 Package build status
        run: |
          echo "✅ Julia package built successfully"
          echo "📦 CTBenchmarks package ready for use"

      # ---------------------------
      # Run Benchmark Script
      # ---------------------------
      - name: Run benchmark script
        id: benchmark
        env:
          SCRIPT_PATH: ${{ env.SCRIPT_PATH }}
        run: |
          echo "🚀 Starting benchmark execution..."
          
          BENCH_FILENAME=$(basename "$SCRIPT_PATH")
          BENCH_ID="${BENCH_FILENAME%.jl}"
          OUTPUT_DIR="docs/src/assets/benchmarks/$BENCH_ID"
          mkdir -p "$OUTPUT_DIR"
          export BENCHMARK_OUTPUT_DIR="$OUTPUT_DIR"
          export BENCHMARK_ID="$BENCH_ID"
          echo "BENCHMARK_OUTPUT_DIR=$OUTPUT_DIR" >> $GITHUB_ENV
          echo "BENCHMARK_ID=$BENCH_ID" >> $GITHUB_ENV

          echo "🏷️  Benchmark ID: $BENCH_ID"
          echo "📁 Output directory (pre-created): $OUTPUT_DIR"

          julia --color=yes -e '
            using Pkg
            
            println("📦 Activating project environment...")
            Pkg.activate(".")
            
            println("📥 Installing dependencies...")
            Pkg.instantiate()
            
            println("🔄 Updating dependencies...")
            Pkg.update()
            
            println("📦 Ensuring JSON package is available...")
            Pkg.add("JSON")
            using JSON
            
            println("🔄 Loading CTBenchmarks package...")
            using CTBenchmarks

            include(ENV["SCRIPT_PATH"])
            if !isdefined(Main, :run)
              error("Benchmark script must define a run() function that returns benchmark results")
            end

            println("▶️  Running benchmark script...")
            results = run()

            bench_id = ENV["BENCHMARK_ID"]
            outpath = ENV["BENCHMARK_OUTPUT_DIR"]
            figures_dir = joinpath(outpath, "figures")

            println("📊 Generating solution plots...")
            CTBenchmarks.plot_solutions(results, figures_dir)
            
            json_path = joinpath(outpath, string(bench_id, ".json"))
            println("💾 Saving results to ", json_path)
            CTBenchmarks.save_json(results, json_path)
            println("📄 JSON file created: ", json_path)
            open(ENV["GITHUB_ENV"], "a") do io
              println(io, "BENCHMARK_JSON=$json_path")
            end
          '
          
          echo "✅ Benchmark execution completed"
          echo "$OUTPUT_DIR" > "$BENCHMARK_OUTPUT_FILE"
          echo "💾 Output path saved to $BENCHMARK_OUTPUT_FILE"
          echo "benchmark_success=true" >> $GITHUB_OUTPUT

      # ---------------------------
      # Copy benchmark scripts and TOML files
      # ---------------------------
      - name: 📋 Copy benchmark script to output directory
        if: steps.benchmark.outputs.benchmark_success == 'true'
        run: |
          echo "📋 Copying benchmark script to output directory..."
          
          if [ -f "$BENCHMARK_OUTPUT_FILE" ]; then
            OUTPUT_DIR=$(cat "$BENCHMARK_OUTPUT_FILE")
            echo "📁 Output directory: $OUTPUT_DIR"
            
            BENCH_ID=$(basename "$OUTPUT_DIR")
            SCRIPT_DEST="$OUTPUT_DIR/$BENCH_ID.jl"
            
            echo "📄 Source script: $SCRIPT_PATH"
            echo "📄 Destination: $SCRIPT_DEST"
            
            cp "$SCRIPT_PATH" "$SCRIPT_DEST"
            echo "✅ Benchmark script copied successfully to $SCRIPT_DEST"
          else
            echo "❌ ERROR: $BENCHMARK_OUTPUT_FILE not found"
            exit 1
          fi

      - name: 📋 Copy TOML files to output directory
        if: steps.benchmark.outputs.benchmark_success == 'true'
        run: |
          echo "📋 Copying TOML files to output directory..."
          
          if [ -f "$BENCHMARK_OUTPUT_FILE" ]; then
            OUTPUT_DIR=$(cat "$BENCHMARK_OUTPUT_FILE")
            echo "📁 Output directory: $OUTPUT_DIR"
            
            cp Project.toml "$OUTPUT_DIR/Project.toml"
            cp Manifest.toml "$OUTPUT_DIR/Manifest.toml"
            
            echo "✅ TOML files copied successfully to $OUTPUT_DIR"
          else
            echo "❌ ERROR: $BENCHMARK_OUTPUT_FILE not found"
            exit 1
          fi

      # ---------------------------
      # Benchmark results validation
      # ---------------------------
      - name: 📊 Benchmark results validation
        if: steps.benchmark.outputs.benchmark_success == 'true'
        run: |
          echo "🔍 Validating benchmark results..."
          
          if [ -f "$BENCHMARK_OUTPUT_FILE" ]; then
            OUTPUT_DIR=$(cat "$BENCHMARK_OUTPUT_FILE")
            echo "✅ Benchmark output directory found: $OUTPUT_DIR"
            
            BENCH_ID="${BENCHMARK_ID:-$(basename "$OUTPUT_DIR") }"
            DATA_JSON_PATH="$OUTPUT_DIR/$BENCH_ID.json"
            echo "📄 Resolved JSON path: $DATA_JSON_PATH"
            
            if [ -f "$DATA_JSON_PATH" ]; then
              FILE_SIZE=$(stat -f%z "$DATA_JSON_PATH" 2>/dev/null || stat -c%s "$DATA_JSON_PATH" 2>/dev/null || echo "unknown")
              LINE_COUNT=$(wc -l < "$DATA_JSON_PATH")
              echo "✅ Benchmark JSON file created successfully"
              echo "📏 File size: $FILE_SIZE bytes"
              echo "📏 File lines: $LINE_COUNT"
              echo "📍 File location: $DATA_JSON_PATH"

              for filename in Project.toml Manifest.toml; do
                FILE_PATH="$OUTPUT_DIR/$filename"
                if [ -f "$FILE_PATH" ]; then
                  echo "✅ Found $filename alongside benchmark output"
                else
                  echo "❌ ERROR: $filename not found in $OUTPUT_DIR"
                  exit 1
                fi
              done
              
              DIR_NAME=$(basename "$OUTPUT_DIR")
              SCRIPT_FILE="$OUTPUT_DIR/$DIR_NAME.jl"
              if [ -f "$SCRIPT_FILE" ]; then
                echo "✅ Found benchmark script: $DIR_NAME.jl"
              else
                echo "❌ ERROR: Benchmark script not found at $SCRIPT_FILE"
                exit 1
              fi
            else
              echo "❌ ERROR: Benchmark JSON file not found at $DATA_JSON_PATH"
              exit 1
            fi
          else
            echo "❌ ERROR: $BENCHMARK_OUTPUT_FILE not found"
            exit 1
          fi

      # ---------------------------
      # Commit benchmark results (silent version)
      # ---------------------------
      - name: Commit benchmark results to current branch
        if: steps.benchmark.outputs.benchmark_success == 'true'
        run: |
          echo "🔧 Configuring git..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Identify current branch (works for PRs and pushes)
          if [ -n "${{ github.head_ref }}" ]; then
            BRANCH_NAME="${{ github.head_ref }}"
          else
            BRANCH_NAME="${{ github.ref_name }}"
          fi
          echo "🌳 Working branch: $BRANCH_NAME"

          # Fetch latest remote state quietly
          if git ls-remote --exit-code origin "$BRANCH_NAME" >/dev/null 2>&1; then
            git fetch origin "$BRANCH_NAME" --quiet
            git reset --mixed origin/"$BRANCH_NAME" --quiet
          fi

          # Determine output directory
          if [ -f "$BENCHMARK_OUTPUT_FILE" ]; then
            OUTPUT_DIR=$(cat "$BENCHMARK_OUTPUT_FILE")
          else
            echo "❌ ERROR: $BENCHMARK_OUTPUT_FILE not found"
            exit 1
          fi

          echo "📁 Benchmark output directory: $OUTPUT_DIR"
          DIR_NAME=$(basename "$OUTPUT_DIR")

          ARTIFACTS=(
            "$OUTPUT_DIR/$DIR_NAME.json"
            "$OUTPUT_DIR/Project.toml"
            "$OUTPUT_DIR/Manifest.toml"
            "$OUTPUT_DIR/$DIR_NAME.jl"
            "$OUTPUT_DIR/figures"
          )

          # Add only benchmark artifacts
          git add "${ARTIFACTS[@]}" >/dev/null 2>&1

          # Quick summary of staged files
          STAGED=$(git diff --cached --name-only | wc -l)
          if [ "$STAGED" -eq 0 ]; then
            echo "ℹ️  No changes detected in benchmark results — skipping commit"
            exit 0
          fi

          echo "📝 Committing $STAGED file(s) to branch $BRANCH_NAME..."
          git commit -m "📊 Add benchmark results (${DIR_NAME})" \
                      -m "Results saved to ${OUTPUT_DIR}/${DIR_NAME}.json" \
                      -m "Includes environment TOMLs and benchmark script" \
                      >/dev/null 2>&1 || {
            echo "❌ Commit failed"
            exit 1
          }

          # Try to rebase quietly before pushing (handle concurrent runs)
          if git ls-remote --exit-code origin "$BRANCH_NAME" >/dev/null 2>&1; then
            git pull --rebase --autostash origin "$BRANCH_NAME" --quiet || {
              echo "⚠️  Rebase conflict — retrying with merge"
              git rebase --abort || true
              git pull --strategy=ours origin "$BRANCH_NAME" --quiet
            }
          fi

          # Push only updated results
          echo "🚀 Pushing results to $BRANCH_NAME..."
          git push origin HEAD:"$BRANCH_NAME" --quiet || {
            echo "❌ Push failed (possible concurrency issue)"
            exit 1
          }

          echo "✅ Benchmark results pushed successfully for $OUTPUT_DIR"

      # ---------------------------
      # Workflow summary
      # ---------------------------
      - name: 📃 Benchmark workflow summary
        if: steps.benchmark.outputs.benchmark_success == 'true'
        run: |
          if [ -f "$BENCHMARK_OUTPUT_FILE" ]; then
            OUTPUT_DIR=$(cat "$BENCHMARK_OUTPUT_FILE")
            echo "📁 Using benchmark output directory: $OUTPUT_DIR"
          else
            echo "❌ ERROR: $BENCHMARK_OUTPUT_FILE not found"
            exit 1
          fi

          DIR_NAME=$(basename "$OUTPUT_DIR")
          echo "📊 Benchmark workflow summary:"
          echo "✅ Benchmark execution: SUCCESS"
          echo "📁 Results saved to: $OUTPUT_DIR/$DIR_NAME.json"
          echo "🌳 Results committed to: ${{ github.head_ref || github.ref_name }} branch"
          echo "📘 Ready for documentation generation"
          echo "🎉 Reusable benchmark workflow completed successfully!"
